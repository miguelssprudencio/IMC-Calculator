<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
    <div class="titulo">
        <h1>>>YOUR IMC<<<br>CALCULATOR</h1>
    </div>
        
        <button id="button">
            <span class="circle1"></span>
    <span class="circle2"></span>
    <span class="circle3"></span>
    <span class="circle4"></span>
    <span class="circle5"></span>
    <span class="start">START</span>
        </button>
    </div>
    
    <div class="como">
            <h2>Como funciona?</h2>
        <ul>1. Perguntaremos seu peso em kg</ul>
        <ul>2. Perguntaremos sua altura em cm</ul>
        <ul>3. Iremos dizer se você está com um peso ideal ou não</ul>
        </div>
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2>Calcular IMC</h2>

            <input type="text" id="nome" placeholder="Seu nome">
            <input type="number" id="peso" placeholder="Peso (kg)">
            <input type="number" id="altura" placeholder="Altura (cm)">

            <button id="calcular">Calcular</button>
             <button id="fechar">Cancelar</button>
        </div>
    </div>
    <div id="modalResultado" class="modal hidden">
        <div class="modal-resultado">
            <h2 id="nomeResultado"></h2>
            <div class="resultado-box">
                <div class="imc-numero" id="imcNumero"></div>
                <div class="imc-categoria" id="imcCategoria"></div>
            </div>
            <button id="novoCalculo" class="btn-novo">Novo Cálculo</button>
        </div>
    </div>
        <script src="script.js"></script>
</body>
</html>
